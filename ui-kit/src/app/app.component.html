<rss-button
  class="toggle-theme-button"
  label="Switch theme"
  severity="contrast"
  icon="rss-home"
  variant="outlined"
  (onClick)="toggleTheme()"
  [raised]="true"
/>

<div class="box">
  <rss-button label="Primary" severity="primary" icon="rss-user" />

  <rss-button label="Success" severity="success" icon="rss-plus" />

  <rss-button label="Danger" severity="danger" icon="rss-trash" />

  <rss-button label="Warn" severity="warn" icon="rss-times" />

  <rss-button label="Info" severity="info" icon="rss-search" />

  <rss-button label="Contrast" severity="contrast" icon="rss-check" />

  <rss-button label="Secondary" severity="secondary" icon="rss-home" />
</div>

  <rss-button label="Warn" severity="warn" icon="rss-times" [rounded]="true" />

  <rss-button label="Info" severity="info" icon="rss-search" [rounded]="true" />

</div>

  <rss-button severity="primary" icon="rss-user" variant="outlined" [raised]="true" />

  <rss-button severity="success" icon="rss-plus" variant="outlined" [raised]="true" />

  <rss-button severity="danger" icon="rss-trash" variant="outlined" [raised]="true" />

  <rss-button severity="danger" icon="rss-trash" [rounded]="true" variant="outlined" />

  <rss-button severity="warn" icon="rss-times" [rounded]="true" variant="outlined" />

  <rss-button severity="primary" icon="rss-user" [rounded]="true" variant="text" />

  <rss-button severity="success" icon="rss-plus" [rounded]="true" variant="text" />

  <rss-button severity="danger" icon="rss-trash" [rounded]="true" variant="text" />

  <rss-button severity="warn" icon="rss-times" [rounded]="true" variant="text" />

  <rss-button severity="info" icon="rss-search" [rounded]="true" variant="text" />

  <rss-button severity="contrast" icon="rss-check" [rounded]="true" variant="text" />

  <rss-button severity="secondary" icon="rss-home" [rounded]="true" variant="text" />
</div>

<div class="box" rssRipple>Light</div>

<div class="box">
  <input type="text" rssInputText size="small" placeholder="Small" />
  <input type="text" rssInputText class="ng-invalid ng-dirty" placeholder="Invalid" />
  <input type="text" rssInputText size="large" variant="filled" placeholder="Filled" />
  <input type="text" rssInputText size="large" disabled placeholder="Disabled" />
  <input type="text" rssInputText size="large" [fluid]="true" placeholder="Fluid" />
</div>

<div class="box">
  <rss-iconfield>
    <rss-inputicon icon="rss-eye"></rss-inputicon>
    <input type="text" rssInputText placeholder="Iconfield" />
    <rss-inputicon icon="rss-eye-slash"></rss-inputicon>
  </rss-iconfield>

  <rss-iconfield>
    <input type="text" rssInputText placeholder="Iconfield" />
    <rss-inputicon icon="rss-envelope"></rss-inputicon>
  </rss-iconfield>

  <rss-iconfield>
    <rss-inputicon icon="rss-user"></rss-inputicon>
    <input type="text" rssInputText placeholder="Iconfield" />
    <rss-inputicon icon="rss-spinner rss-spin"></rss-inputicon>
  </rss-iconfield>
</div>

<div class="box">
  <rss-floatlabel>
    <input id="username" rssInputText />
    <label for="username">Username</label>
  </rss-floatlabel>

  <rss-floatlabel variant="in">
    <input id="in" rssInputText />
    <label for="in">In label</label>
  </rss-floatlabel>

  <rss-floatlabel variant="on">
    <input id="on" rssInputText />
    <label for="on">On label</label>
  </rss-floatlabel>

  <rss-floatlabel>
    <input id="error" class="ng-dirty ng-invalid" rssInputText />
    <label for="error">Error label</label>
  </rss-floatlabel>

  <rss-floatlabel>
    <rss-iconfield>
      <rss-inputicon class="rss-icon rss-user" />
      <input rssInputText id="over_label" autocomplete="off" />
    </rss-iconfield>
    <label for="over_label">Over label</label>
  </rss-floatlabel>
</div>

<div class="box">
  <form [formGroup]="formGroup" (submit)="onSubmit()">
    <rss-floatlabel>
      <rss-password formControlName="value" size="large" inputId="password" [toggleMask]="true"></rss-password>
      <label for="password">Password</label>
    </rss-floatlabel>
    @if (this.formGroup.controls.value.dirty && this.formGroup.controls.value.hasError('required')) {
      <div class="error">Password is required</div>
    }
  </form>
</div>
