  label="Primary"
  severity="primary"
  icon="rss-user"
  size="large"
  variant="outlined"
  raised="true"
/>

  label="Success"
  severity="success"
  icon="rss-plus"
  size="large"
  variant="outlined"
  raised="true"
/>

  severity="warn"
  icon="rss-times"

  raised="true"
/>

<rss-button
  label="Info"

  icon="rss-search"
  size="large"
  variant="outlined"
  raised="true"
/>

<rss-button
  label="Contrast"

  label="Secondary"
  severity="secondary"

/>

<div class="box" rssRipple>Light</div>

<input type="text" rssInputText size="small" placeholder="Small" />
<input
  type="text"
  rssInputText
  class="ng-invalid ng-dirty"
  placeholder="Invalid"
/>
<input
  type="text"
  rssInputText
  size="large"
  variant="filled"
  placeholder="Filled"
/>
<input type="text" rssInputText size="large" disabled placeholder="Disabled" />
<input type="text" rssInputText size="large" fluid="true" placeholder="Fluid" />
