<div
  class="rss-menu-item-content"
  [class.disabled]="item?.disabled"
  [class.rss-menu-item-expanded]="item?.children?.length"
  (click)="onItemClick($event, item)"
>
  <ng-container *ngIf="!itemTemplate">
    <a
      *ngIf="!item?.routerLink"
      rssRipple
      [attr.title]="item?.title"
      [attr.href]="item?.url || null"
      class="rss-menu-item-link"
      [target]="item?.target"
    >
      <ng-container *ngTemplateOutlet="itemContent; context: { $implicit: item }"></ng-container>
    </a>
    <a
      *ngIf="item?.routerLink"
      rssRipple
      [routerLink]="item?.routerLink"
      [attr.title]="item?.title"
      routerLinkActive="rss-menu-item-link-active"
      class="rss-menu-item-link"
      [class.rss-menu-item-empty]="!item?.label && !item?.icon"
      [target]="item?.target"
    >
      <ng-container *ngTemplateOutlet="itemContent; context: { $implicit: item }"></ng-container>
    </a>
  </ng-container>

  <ng-container *ngIf="itemTemplate">
    <ng-template *ngTemplateOutlet="itemTemplate; context: { $implicit: item }"></ng-template>
  </ng-container>
</div>

<ng-template #itemContent>
  <i class="rss-menu-item-icon" *ngIf="item?.icon" [class]="item?.icon"></i>
  <span class="rss-menu-item-label">{{ item?.label }}</span>
</ng-template>
