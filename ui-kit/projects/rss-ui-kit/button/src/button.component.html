<button
  class="rss-button"
  [class]="this.getClasses()"
  [disabled]="this.disabled()"
  (click)="this.onClick.emit($event)"
  rssRipple
>
  @if (this.icon()) {
  <span
    class="rss-button-icon rss-icon"
    [class]="[this.handleIconPosition(), this.handleIcon()].join(' ')"
  ></span>
  } @if (this.label()) {
  <span class="rss-button-label">{{ this.label() }}</span>
  }

  <ng-content></ng-content>
</button>
